[tools]
node = "22"
pnpm = "10.33.2"

# Dev secrets live in `.env.local` (gitignored) — copy `.env.local.example`
# on first clone and drop in real values. Currently needed only for
# LITELLM_MASTER_KEY (auth for the eval proxy) + any backend API keys
# you enable in litellm/config.yaml. mise warns but doesn't fail if the
# file is missing, so fresh clones work until you try to run evals.
[env]
_.file = ".env.local"

[tasks.test]
description = "Run the unit-test suite"
run = "pnpm test"

[tasks.coverage]
description = "Run tests with coverage (text + HTML report under coverage/)"
run = "pnpm test:coverage"

[tasks.typecheck]
description = "Type-check the project (tsc --noEmit)"
run = "pnpm typecheck"

[tasks.lint]
description = "Biome lint + format check"
run = "pnpm lint"

[tasks.deps-check]
description = "Dependency-cruiser — architectural layer rules"
run = "pnpm deps:check"

[tasks.deps-graph]
description = "Regenerate docs/ARCHITECTURE-graph.md from the live module graph"
run = "pnpm deps:graph"

[tasks.fixture-setup]
description = "Stage the fixture target repo at .scratch/target-repo for dev-loop ordin runs"
run = "pnpm fixture:setup"

[tasks.litellm-up]
description = "Start the LiteLLM proxy (Docker) for eval runs"
run = "docker compose -f infra/docker-compose.yml up -d litellm"

[tasks.litellm-down]
description = "Stop the LiteLLM proxy"
run = "docker compose -f infra/docker-compose.yml down"

[tasks.litellm-logs]
description = "Tail LiteLLM proxy logs"
run = "docker compose -f infra/docker-compose.yml logs -f litellm"

[tasks.eval]
description = "Run the eval suite (requires `mise run litellm-up` first)"
run = "pnpm eval"

[tasks.check]
description = "Full pre-commit sweep: typecheck + test + lint + deps-check"
depends = ["typecheck", "test", "lint", "deps-check"]
