# LiteLLM proxy configuration — eval-only.
#
# Phase 4 of the harness plan introduces LiteLLM *scoped to the local eval
# suite*. Production runs still go through `ClaudeCliRuntime` on Max plan;
# this proxy is only in the path when `ordin eval` is invoked.
#
# Why a proxy rather than SDK mode: LiteLLM is Python. Running the proxy
# means the TS harness can talk OpenAI-shaped HTTP to a single endpoint
# and the backend is swapped by editing one YAML — no TS changes, no
# rebuild, no code-level provider logic.
#
# Start it:   mise run litellm-up
# Stop it:    mise run litellm-down
# Swap backend: edit `model_list` below, then mise run litellm-up

# ---- model list ----------------------------------------------------------
# Each entry declares an alias (`model_name`) the harness can reference,
# and the `litellm_params` routing it to a real backend. Swap freely.
#
# Evals reference models by alias. The alias → backend mapping lives here;
# the harness never sees provider strings.

model_list:
  # Two kinds of aliases below:
  #
  # 1. HARNESS-SIDE DEFAULTS — aliases matching the composer-side model
  #    names in ordin.config.yaml (`claude-sonnet-4-6` etc.). These are
  #    the "no config" experience: run `bun run eval` and it just works.
  #    Each routes to the current default backend.
  #
  # 2. BACKEND ALIASES — one per specific model (`qwen3-8b`, `qwen3-14b`,
  #    etc.). Declared once. Used for iteration/comparison by setting
  #    `ORDIN_EVAL_MODEL=qwen3-14b bun run eval` — the helpers map all
  #    composer-side names to the chosen backend alias.
  #
  # Qwen 3 has native OpenAI-format tool-use, load-bearing for agentic
  # loops. Avoid smaller models (< 7B) for tool-use unless you've verified
  # they emit `tool_calls` structurally (qwen2.5-coder:7b does not).

  # --- harness-side defaults (route to the working baseline) ---

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: ollama_chat/qwen3:8b
      # host.docker.internal resolves to the host Ollama from inside the
      # litellm container (see extra_hosts in infra/docker-compose.yml).
      api_base: http://host.docker.internal:11434

  - model_name: claude-opus-4-7
    litellm_params:
      model: ollama_chat/qwen3:8b
      api_base: http://host.docker.internal:11434

  - model_name: claude-haiku-4-5
    litellm_params:
      model: ollama_chat/qwen3:4b
      api_base: http://host.docker.internal:11434

  # --- backend aliases for ORDIN_EVAL_MODEL experimentation ---
  # Add more here as you want to test them. `mise run litellm-down &&
  # litellm-up` picks up changes. Pull the model via `ollama pull` first.

  - model_name: qwen3-4b
    litellm_params:
      model: ollama_chat/qwen3:4b
      api_base: http://host.docker.internal:11434

  - model_name: qwen3-8b
    litellm_params:
      model: ollama_chat/qwen3:8b
      api_base: http://host.docker.internal:11434

  - model_name: qwen3-14b
    litellm_params:
      model: ollama_chat/qwen3:14b
      api_base: http://host.docker.internal:11434

  - model_name: qwen3-32b
    litellm_params:
      model: ollama_chat/qwen3:32b
      api_base: http://host.docker.internal:11434

  # Qwen3-Coder MoE — 30B total, 3B active per forward pass. Inference
  # cost scales with active params, so speed is closer to a dense 3-4B
  # while knowledge is closer to 30B. Coder-specialised: trained on code
  # + tool-use workflows. Good candidate for our RFC-from-code-exploration
  # task specifically.
  - model_name: qwen3-coder-30b
    litellm_params:
      model: ollama_chat/qwen3-coder:30b
      api_base: http://host.docker.internal:11434

  # Catch-all: any model not explicitly aliased above passes through to
  # Ollama by tag. Lets `ollama pull <tag> && bun run ordin run --model <tag>`
  # just work — no config edit, no proxy bounce. The explicit aliases
  # above still take precedence for canonical names.
  - model_name: "*"
    litellm_params:
      model: ollama_chat/*
      api_base: http://host.docker.internal:11434

  # Alternatives — replace the Ollama entries above with these to swap
  # backends. The `model_name` field is the alias the harness references
  # (matching `ordin.config.yaml`); `litellm_params.model` is the real
  # backend LiteLLM routes to.
  #
  # Anthropic passthrough (requires ANTHROPIC_API_KEY):
  # - model_name: claude-sonnet-4-6
  #   litellm_params:
  #     model: anthropic/claude-sonnet-4-6
  #     api_key: os.environ/ANTHROPIC_API_KEY
  #
  # OpenAI standing in for claude-sonnet-4-6 (requires OPENAI_API_KEY):
  # - model_name: claude-sonnet-4-6
  #   litellm_params:
  #     model: openai/gpt-4o-mini
  #     api_key: os.environ/OPENAI_API_KEY
  #
  # OpenRouter (requires OPENROUTER_API_KEY):
  # - model_name: claude-sonnet-4-6
  #   litellm_params:
  #     model: openrouter/anthropic/claude-sonnet-4.6
  #     api_key: os.environ/OPENROUTER_API_KEY
  #
  # AWS Bedrock (requires AWS_* env vars):
  # - model_name: claude-sonnet-4-6
  #   litellm_params:
  #     model: bedrock/anthropic.claude-sonnet-4-6-v1:0

# ---- proxy-wide settings -------------------------------------------------

litellm_settings:
  # Drop unsupported params rather than erroring — some backends (Ollama)
  # ignore `response_format`, `seed`, etc. Keeps provider swap frictionless.
  drop_params: true
  # Log sparingly. Evals produce enough noise already.
  set_verbose: false
  # No cache yet. Add `cache: true` + `cache_params: { type: disk, ... }`
  # when iteration latency becomes painful — requires the `litellm[caching]`
  # extra, which means either a custom Dockerfile or an in-memory `local`
  # cache type. Deferred until a real iteration-speed complaint fires.

# ---- server -------------------------------------------------------------
# Proxy auth. LITELLM_MASTER_KEY comes from `.env.local` via mise; the
# docker-compose file forwards it. The harness client (AiSdkRuntime)
# reads the same var and sends it as `Authorization: Bearer`. Localhost
# binding (see infra/docker-compose.yml) plus auth means accidental
# exposure doesn't leak backend credentials.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
