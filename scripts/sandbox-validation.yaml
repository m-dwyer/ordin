# Deterministic plan for the sandbox-validation workflow.
#
# Auto-loaded by ScriptedRuntime when the matching workflow runs.
# Override with `--script <path>` if you want a different plan.
#
# Variables substituted at dispatch time: {cwd}, {workspace}, {run_id},
# {phase}. Slugs are NOT substituted here — the orchestrator does slug
# substitution at the artefact-path layer (see workflow YAML's `outputs`).

phases:
  validate:
    steps:
      - text: |
          Sandbox validation plan starting. Tool surface for this phase:
          Read, Write, Glob, Bash. Workspace: {workspace}.

      # 1. Read tool — read a file from the workspace.
      - tool:
          name: Read
          input:
            file_path: README.md

      # 2. Glob tool — list workspace contents.
      - tool:
          name: Glob
          input:
            pattern: "**/*"

      # 3. Bash tool — verify shell + filesystem access work end-to-end
      #    inside the sandbox. Should succeed because cwd is the workspace
      #    (read-allowed) and ls is on system PATH.
      - tool:
          name: Bash
          input:
            command: "ls -la && pwd"

      # 4. Bash tool — verify a write to the workspace succeeds via shell
      #    redirection (different code path from the Write tool).
      - tool:
          name: Bash
          input:
            command: "echo 'sandbox validation: shell write OK' > .sandbox-validation-marker && cat .sandbox-validation-marker"

      # 5. Bash tool — verify the worker process cannot see broker
      #    credentials or common parent-side secrets. srt may set
      #    HTTP_PROXY to its own proxy, so this checks secret values and
      #    broker URL userinfo rather than requiring proxy vars to be absent.
      - tool:
          name: Bash
          input:
            command: |
              if env | grep -E 'ordin:|LANGFUSE_|LITELLM_MASTER_KEY|ANTHROPIC_API_KEY|OPENAI_API_KEY|GITHUB_TOKEN|GH_TOKEN|AWS_SECRET_ACCESS_KEY|AWS_SESSION_TOKEN'; then
                echo "forbidden env leaked"
                exit 1
              fi
              echo "sandbox validation: worker env secret check OK"

      # 6. Bash tool — verify the home root is not generally readable.
      #    ~/.claude is a narrow read allow for Claude Max-plan auth; the
      #    rest of $HOME should remain outside the worker's read surface.
      - tool:
          name: Bash
          input:
            command: |
              if ls "$HOME" >/tmp/ordin-home-list 2>/tmp/ordin-home-err; then
                echo "home root read unexpectedly succeeded"
                exit 1
              fi
              echo "sandbox validation: home root read denied"

      - text: |
          Tool surface verified. Writing the validation report.

      - tool:
          name: Write
          input:
            file_path: reviews/sandbox-validation-report.md
            content: |
              # Sandbox validation report

              Workflow: sandbox-validation
              Run ID: {run_id}
              Workspace: {workspace}
              Phase: {phase}

              ## Tool surface
              - Read: succeeded
              - Glob: succeeded
              - Bash: succeeded (ls + pwd)
              - Bash: succeeded (shell-redirect write)
              - Bash: succeeded (worker env secret check)
              - Bash: succeeded (home root read denied)
              - Write: succeeded (this report)

              ## Outcome
              All seven probes succeeded under the active sandbox profile.
              The v1 sandbox correctly permits the documented tool surface
              while denying everything else by default (see ADR-014).
