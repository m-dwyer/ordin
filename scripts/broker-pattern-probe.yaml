# Scripted plan paired with `workflows/broker-pattern-probe.yaml`.
#
# The phase's allowed_tools is `Bash(git diff*)`. The first Bash step
# should pass. The second Bash step intentionally does not match the
# pattern, so the broker rejects it and the run fails.

phases:
  probe:
    steps:
      - text: "broker pattern probe - matching Bash should pass; non-matching Bash should be denied"
      - tool:
          name: Bash
          input:
            command: git diff --stat
      - tool:
          name: Bash
          input:
            command: npm install
