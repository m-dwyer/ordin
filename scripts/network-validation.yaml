# Deterministic plan for the network-validation workflow.
#
# Auto-loaded by ScriptedRuntime when the matching workflow runs.
#
# Each probe Bash step swallows curl's exit so the step itself always
# succeeds (executeBash rejects on non-zero) — the probe's outcome is
# captured as text in the report file. The final assertion step is
# what fails the workflow when the egress lockdown misbehaves.
#
# Probe naming convention in the report:
#   <label>-<expected>: code=<httpcode> exit=<curl_exit>
# where <expected> ∈ {allowed, denied}. The assertion step greps for
# the expected pattern shape and exits non-zero on mismatch.

phases:
  validate:
    steps:
      - text: |
          Network egress validation. Probing the egress allowlist with curl
          and recording each outcome in the report. Workspace: {workspace}.

      # Initialize the report file (workspace path; sandbox-allowed write).
      - tool:
          name: Bash
          input:
            command: |
              cat > reviews/network-validation-validate-report.md <<'EOF'
              # Network validation report

              Each line below is one egress probe. `code=` is curl's
              `http_code` (empty when the request never reached an HTTP
              response). `exit=` is curl's exit status (0=success, 7=
              connection refused, 28=timeout, 56=recv-failure-on-close —
              srt's deny-path).

              EOF
              mkdir -p reviews

      # Probe 1: api.anthropic.com is NOT in the default policy. Expected
      # denied — verifies that even Anthropic's API is locked down by
      # default; ClaudeCliRuntime users opt in via --allow-domain.
      - tool:
          name: Bash
          input:
            command: |
              { printf "anthropic-denied: "; \
                curl -sS -o /dev/null -w "code=%{http_code} " --max-time 10 https://api.anthropic.com 2>/dev/null; \
                echo "exit=$?"; \
              } >> reviews/network-validation-validate-report.md

      # Probe 2: github.com is NOT allowlisted. Expected denied (curl exit
      # non-zero, code= empty).
      - tool:
          name: Bash
          input:
            command: |
              { printf "github-denied: "; \
                curl -sS -o /dev/null -w "code=%{http_code} " --max-time 10 https://github.com 2>/dev/null; \
                echo "exit=$?"; \
              } >> reviews/network-validation-validate-report.md

      # Probe 3: example.com is NOT allowlisted. Expected denied.
      - tool:
          name: Bash
          input:
            command: |
              { printf "example-denied: "; \
                curl -sS -o /dev/null -w "code=%{http_code} " --max-time 10 https://example.com 2>/dev/null; \
                echo "exit=$?"; \
              } >> reviews/network-validation-validate-report.md

      # Probe 4: api.openai.com is NOT allowlisted. Expected denied. The
      # default policy locks egress to LiteLLM (localhost) + Anthropic;
      # going around LiteLLM directly is the canonical exfil path to seal.
      - tool:
          name: Bash
          input:
            command: |
              { printf "openai-denied: "; \
                curl -sS -o /dev/null -w "code=%{http_code} " --max-time 10 https://api.openai.com 2>/dev/null; \
                echo "exit=$?"; \
              } >> reviews/network-validation-validate-report.md

      # Probe 5: localhost:4000 (LiteLLM). srt sets NO_PROXY=localhost,...
      # so this bypasses the egress proxy. Expected exit 0 (LiteLLM up)
      # OR exit 7 (LiteLLM not running but kernel allowed the connect)
      # — never exit 28 (timeout, which would mean the kernel blocked it).
      - tool:
          name: Bash
          input:
            command: |
              { printf "litellm-allowed: "; \
                curl -sS -o /dev/null -w "code=%{http_code} " --max-time 5 http://localhost:4000/health 2>/dev/null; \
                echo "exit=$?"; \
              } >> reviews/network-validation-validate-report.md

      # Probe 6: raw IP. Confirms that hostname-based allowlists aren't
      # bypassed by directly CONNECT-ing to an IP. Expected denied.
      - tool:
          name: Bash
          input:
            command: |
              { printf "rawip-denied: "; \
                curl -sS -o /dev/null -w "code=%{http_code} " --max-time 10 https://1.1.1.1 2>/dev/null; \
                echo "exit=$?"; \
              } >> reviews/network-validation-validate-report.md

      - text: |
          Probes complete. Asserting the egress matrix.

      # Final assertion. Greps the report for expected per-probe shapes
      # and exits non-zero on the first mismatch. Each FAIL line names
      # which probe disagreed so a flake is diagnosable from the
      # transcript without re-running.
      - tool:
          name: Bash
          input:
            command: |
              R=reviews/network-validation-validate-report.md
              fail=0
              echo "--- assertions ---"

              # Helper: check that line matches a regex; print FAIL/OK and bump fail counter.
              check() {
                local label="$1" pattern="$2"
                local line
                line=$(grep "^${label}: " "$R" | head -1)
                if printf '%s' "$line" | grep -Eq "$pattern"; then
                  echo "OK   $label  -> $line"
                else
                  echo "FAIL $label  -> $line  (want: $pattern)"
                  fail=1
                fi
              }

              # Denied -> exit non-zero AND no HTTP response. curl emits
              # `code=000` when the connection was refused at the proxy
              # layer; under srt's deny path that's typically exit=56
              # (recv-failure-on-close). Any non-000 code means the host
              # responded HTTP — an egress leak.
              check "anthropic-denied"  "code=000 exit=[1-9]"
              check "github-denied"     "code=000 exit=[1-9]"
              check "example-denied"    "code=000 exit=[1-9]"
              check "openai-denied"     "code=000 exit=[1-9]"
              check "rawip-denied"      "code=000 exit=[1-9]"

              # localhost: any exit IS OK as long as it's NOT 28 (timeout
              # = kernel-level block on localhost). 0 = LiteLLM up; 7 =
              # LiteLLM not running; both fine.
              line=$(grep "^litellm-allowed: " "$R" | head -1)
              if printf '%s' "$line" | grep -Eq "exit=(0|7|56)"; then
                echo "OK   litellm-allowed  -> $line"
              else
                echo "FAIL litellm-allowed  -> $line  (kernel may have blocked localhost)"
                fail=1
              fi

              echo "--- summary ---"
              if [ $fail -eq 0 ]; then
                echo "all egress assertions passed"
                {
                  echo ""
                  echo "## Outcome"
                  echo ""
                  echo "All assertions passed: egress matrix matches the configured policy."
                } >> "$R"
              else
                echo "egress assertions FAILED"
                {
                  echo ""
                  echo "## Outcome"
                  echo ""
                  echo "ASSERTIONS FAILED — see transcript above."
                } >> "$R"
                exit 1
              fi
