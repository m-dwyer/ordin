# ordin configuration — harness-level defaults + opaque per-runtime config.
#
# Layering:
#   run_store / default_runtime / default_model / allowed_tools / tiers
#     are harness-level; schema lives in src/domain/config.ts.
#   runtimes.<name>.* is opaque to the domain; each runtime validates its
#     own slice via its `fromConfig`.
#   Workflow-specific phase config lives in workflows/*.yaml.

# Where per-run metadata and transcripts are persisted.
run_store:
  base_dir: ~/.ordin/runs

# Which runtime entry to use when a workflow phase doesn't specify one.
default_runtime: ai-sdk

# Final fallback when neither the workflow nor phase declares a model/tools.
default_model: qwen3-8b
allowed_tools: []

# Sandbox configuration for `ordin run`. Legacy string form is still
# accepted (`sandbox: passthrough` / `sandbox: srt`); the object form
# below is the full shape:
#
sandbox:
  mode: srt
  local_services:
    # Structured form: { target: "host:port", auth?: { ... } }. The
    # broker resolves env vars at construction (parent-side) and stamps
    # the resulting Authorization header onto each forwarded request.
    # The inner never sees these env vars or the formatted header.
    otel:
      target: 127.0.0.1:3000 # Langfuse OTLP receiver
      auth:
        type: basic
        username_env: LANGFUSE_PUBLIC_KEY
        password_env: LANGFUSE_SECRET_KEY
    llm-gateway:
      target: 127.0.0.1:4000 # LiteLLM (OpenAI-compatible)
      auth:
        type: bearer
        token_env: LITELLM_MASTER_KEY

# Per-runtime configs. Keys here match the `runtime:` field in
# workflows/<name>.yaml phases. Schemas validated by each runtime.
runtimes:
  ai-sdk:
    # OpenAI-compatible provider, routed via the broker. Inner sends to
    # `http://llm-gateway/...`; srt approves the hostname (it's in
    # local_services) and forwards to the broker, which maps llm-gateway
    # → 127.0.0.1:4000 (LiteLLM) and stamps `Authorization: Bearer
    # <LITELLM_MASTER_KEY>` from parent-side env. The inner has no
    # api_key — `LITELLM_MASTER_KEY` is in the inner-env denylist.
    base_url: http://llm-gateway/
    max_steps: 40

  claude-cli-provider:
    bin: claude
    timeout_ms: 600000
    max_steps: 40
    protocol_debug: true

# Per-tier model overrides. Only the neutral `model` knob is represented
# here — runtime-specific knobs (Claude's `--effort`, for example) are
# derived from the tier inside the runtime itself. Workflow/phase model
# declarations win over these tier fallbacks.
tiers:
  S:
    # S-tier: trivial work. Prefer the cheapest/fastest local model.
    model: qwen3-4b
  M:
    # M-tier: balanced local model.
    model: qwen3-8b
  L: {}
    # L-tier: heaviest profile. Empty object means per-phase defaults win
    # (currently qwen3-8b for all default workflow phases).
