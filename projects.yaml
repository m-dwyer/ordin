# Shared project registry.
# Personal paths and overrides belong in `projects.local.yaml` (gitignored).

projects:
  # Fixture target repo used by harness developers for local dev loops.
  # Path is relative to the harness repo root; created by `pnpm fixture:setup`.
  # Safe to keep committed — the `.scratch/` directory it points at is gitignored,
  # and the name `fixture` only resolves to something once setup has been run.
  fixture:
    path: .scratch/target-repo
